<!doctype html>

<html lang="en">

<head>

    <meta charset="utf-8">

    <title> Environment 3 </title>

    <link rel="stylesheet" href="env03.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="env03.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alata&family=Freckle+Face&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Alata&family=Chiron+GoRound+TC:wght@200..900&family=Freckle+Face&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- top section -->
    <div class="top-section">

        <h1> <span class="highlight_01"> Sunlight Zone </span> </h1>

        <p> Here are some creatures from the topmost part of the ocean.
        </p>

        <p> With lots of sunlight and easy access to oxygen, this is an ideal place for photosynthesis. </br>
        </p>

    </div>

    <!-- button menu -->
    <div class="button-menu">

        <div id="environment-output"></div>

        <button id="title"> Title </button>

        <button id="main-entity"> Main Entity </button>

        <button id="conditions"> Conditions </button>

        <button id="percent"> How Much? </button>

        <button id="depth"> How Deep? </button>

    </div>

    <!-- main section contains the characters -->
    <div class="main-section">

        <!-- sea lion -->
        <div id="sea-lion">

            <div class="animal">

                <h2> <span class="highlight_01"> Do a Flip! </span> </h2>

                <p> The sea lion is showing off its moves.
                </p>

            </div>

            <img src="sea-lion.png" />

        </div>

        <!-- sea turtle -->
        <div id="sea-turtle">

            <div class="animal">

                <h2> <span class="highlight_01"> Lunchtime! </span> </h2>

                <p> The sea turtle is eating sea grass.
                </p>

            </div>

            <img src="sea-turtle.png" />

        </div>

    </div>

    <!-- sea grass -->
    <div id="sea-grass">

        <img src="sea-grass.png" />

    </div>

</body>

</html>
